
<div class="modal fade" id="mitgliedModal" tabindex="-1">

  <div class="modal-dialog modal-lg">

    <div class="modal-content">

      <form id="mitglied-form">

        <div class="modal-header">
          <h5 class="modal-title" id="mitgliedModalLabel">
            Mitglied bearbeiten
          </h5>

          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal">
          </button>
        </div>

        <div class="modal-body">

          <input type="hidden" id="modal-id">

          <div class="row">

            <div class="col-md-6 mb-3">
              <label class="form-label">Name</label>

              <input
                type="text"
                class="form-control"
                id="modal-name"
                required
              >
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Nickname</label>

              <input
                type="text"
                class="form-control"
                id="modal-nickname"
              >
            </div>

          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>

            <input
              type="email"
              class="form-control"
              id="modal-email"
            >
          </div>

          <!-- Erweiterte Einstellungen -->
          <div class="accordion mt-4" id="advancedAccordion">

            <div class="accordion-item">

              <h2 class="accordion-header">

                <button
                  class="accordion-button collapsed"
                  type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#advancedCollapse"
                >
                  Erweiterte Einstellungen
                </button>

              </h2>

              <div
                id="advancedCollapse"
                class="accordion-collapse collapse"
              >

                <div class="accordion-body">

                  <div class="form-check form-switch mb-3">

                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="modal-aktiv"
                    >

                    <label class="form-check-label">
                      Aktiv
                    </label>

                  </div>

                  <div class="form-check form-switch mb-3">

                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="modal-verborgen"
                    >

                    <label class="form-check-label">
                      Verborgen
                    </label>

                  </div>

                  <div class="mb-3">

                    <label class="form-label">
                      Schwärzungsgrenze (€)
                    </label>

                    <input
                      type="number"
                      step="0.01"
                      class="form-control"
                      id="modal-schwaerzungs-grenze"
                    >

                    <small class="text-muted">
                      Optional — überschreibt globale Grenze
                    </small>

                  </div>

                </div>

              </div>

            </div>

          </div>

        </div>

        <div class="modal-footer">

          <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal"
          >
            Abbrechen
          </button>

          <button
            type="submit"
            class="btn btn-primary"
          >
            Speichern
          </button>

        </div>

      </form>

    </div>

  </div>

</div>
