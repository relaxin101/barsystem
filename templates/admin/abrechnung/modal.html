<div class="modal fade" id="abrechnungModal" tabindex="-1">

  <div class="modal-dialog">

    <div class="modal-content">

      <form id="abrechnung-form">

        <div class="modal-header">

          <h5 class="modal-title">
            Abrechnung
          </h5>

          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
          ></button>

        </div>

        <div class="modal-body">

          <div class="mb-3">

            <label class="form-label">
              Name
            </label>

            <input
              type="text"
              id="modal-name"
              class="form-control"
              required
            >

          </div>

          <hr>

          <div class="mb-3">

            <label class="form-label">
              Buchungen auswählen
            </label>

            <div class="form-check">

              <input
                class="form-check-input"
                type="radio"
                name="modus"
                value="offen"
                checked
              >

              <label class="form-check-label">
                Alle offenen Buchungen
              </label>

            </div>

            <div class="form-check">

              <input
                class="form-check-input"
                type="radio"
                name="modus"
                value="zeitraum"
              >

              <label class="form-check-label">
                Zeitraum auswählen
              </label>

            </div>

          </div>

          <div id="zeitraum-container" style="display:none;">

            <div class="mb-3">

              <label class="form-label">
                Von
              </label>

              <input
                type="datetime-local"
                id="modal-start"
                class="form-control"
              >

            </div>

            <div class="mb-3">

              <label class="form-label">
                Bis
              </label>

              <input
                type="datetime-local"
                id="modal-end"
                class="form-control"
              >

            </div>

          </div>

        </div>

        <div class="modal-footer">

          <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal"
          >
            Abbrechen
          </button>

          <button
            type="submit"
            class="btn btn-success"
          >
            Erstellen
          </button>

        </div>

      </form>

    </div>

  </div>

</div>
